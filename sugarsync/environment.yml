name: sugarsync
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - jupyter
  - ipykernel
  - openpyxl
  - pyyaml
  - pip
  - pip:
    - xgboost>=2.0.0
    - lightgbm>=4.0.0
    - shap>=0.44.0
    - lime>=0.2.0.1
    - pyserial>=3.5
    - rich>=13.0.0
    - tqdm>=4.65.0
    - flask>=3.0.0
    - flask-cors>=4.0.0
    - pytest>=7.4.0
    - pytest-cov>=4.1.0
